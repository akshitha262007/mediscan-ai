<!DOCTYPE html>
<html>
<head>
    <title>MediScan Login</title>
</head>
<body>

<h1>Login</h1>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<a href="/register">
Register Here
</a>

</body>
</html>
